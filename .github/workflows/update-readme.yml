name: Update README Timestamp

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-timestamp
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README timestamp
        run: |
          current_time=$(TZ="Asia/Jakarta" date "+%Y-%m-%d %H:%M:%S")
          export CURRENT_TIME="$current_time"

          if ! grep -q "<!--TIMESTAMP_START-->" README.md; then
            echo "Timestamp marker not found in README.md"
            exit 1
          fi

          perl -0pi -e 's/<!--TIMESTAMP_START-->.*?<!--TIMESTAMP_END-->/<!--TIMESTAMP_START-->$ENV{CURRENT_TIME}<!--TIMESTAMP_END-->/s' README.md

          echo "CURRENT_TIME=$current_time" >> "$GITHUB_ENV"

      - name: Commit and push changes
        run: |
          if git diff --quiet README.md; then
            echo "No changes to commit"
            exit 0
          fi

          git config --local user.name "HasanH47"
          git config --local user.email "cruweldevil@gmail.com"

          git add README.md
          git commit -m "chore(profile): update timestamp to ${CURRENT_TIME} WIB"
          git push
